<div class="modal-header">
    <h4 class="modal-title">Supprimer un produit</h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss('Cross click')"></button>
</div>
<div class="modal-body">
    <p>Voulez vous vraiment supprimer le produit <span class="text-primary">{{nom}}?</span></p>
<p>
				Toutes les informations du produit seront supprimées.
				<span class="text-danger">Cette opération est irreversible.</span>
			</p>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" (click)="activeModal.close('annuler')">
        Annuler
    </button>
    <button type="button" class="btn btn-danger" (click)="activeModal.close('supprimer')">
        Supprimer
    </button>
</div>

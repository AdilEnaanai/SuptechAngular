<form id="form" [formGroup]="formData">
    <div>
        <button type="button" class="close" aria-label="Close" (click)="closeModal()">
        <span aria-hidden="true">&times;</span>
        </button>
    </div>
        
    <div>
        <h2>Ajouter un produit</h2>
    </div>
  <div  class="col">
    <div class="col">
      <input type="text" class="form-control" placeholder="Nom" formControlName="nom">
    </div>
    <div class="col">
      <input type="text" class="form-control" placeholder="Prix" formControlName="prix">
    </div>
        <div class="col">
          <select name="" id="" formControlName="categorie" class="form-control">
            @if (categories|async) {
              <option value="">Sélectionnez une catégorie</option>
            }
            @for (categorie of (categories|async); track categorie.id) {
              <option value="{{categorie.nom}}">{{categorie.nom}}</option>
            }
          </select>
    </div>
    <div class="col">
      <button type="button" class="btn btn-primary" (click)="save()">Save</button>
      </div>
  </div>
</form>

<button type="button" class="btn btn-primary" (click)="openModal()">Ajouter</button>
<table class="table table-striped">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Nom</th>
      <th scope="col">Prix</th>
      <th scope="col">Catégorie</th>
      <th scope="col">Action</th>
    </tr>
  </thead>
  <tbody>
    @for (produit of (produits()); track produit.id) {
      <tr>
        <th >{{$index + 1}}</th>
        <td>{{ produit.nom }}</td>
        <td>{{ produit.prix }}</td>
        <td>{{ produit.categorie }}</td>
        <td><img class="actionBTN" (click)=openDeleteModal(produit) src="https://files.softicons.com/download/toolbar-icons/vista-base-software-icons-2-by-icons-land/ico/DeleteRed.ico"></td>
      </tr>
    }
  
  </tbody>
</table>
